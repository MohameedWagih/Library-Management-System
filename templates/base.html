<script>
$(document).ready(function(){

    // ===============================================================
    // 1. قسم العمليات الحسابية (الأسعار والأرباح)
    // ===============================================================

    // أ. حساب إجمالي سعر استعارة الكتاب تلقائياً عند الإدخال
    $("#rental_price_day, #rental_period").keyup(function(){
        var price = $("#rental_price_day").val() || 0; 
        var period = $("#rental_period").val() || 0;
        $("#total_rental_price").val(price * period);
    });

    // ب. حساب إجمالي أرباح الموقع (مباع + مستعار)
    var total = 0;
    $('.totalprice').each(function(){
        total += parseFloat($(this).text()) || 0; // || 0 عشان لو الحقل فاضي ميديناش إيرور
    });
    // حطينا علامة الدولار مباشرة بدل ما نسحبها من الـ HTML عشان نتجنب أي لغبطة
    $('#totalsalarys').text("$" + total); 

    // ج. تجميع أرباح الكتب المستعارة فقط (للرسم البياني)
    var total1 = 0;
    $('.rentedtotals').each(function(){
        $(this).hide(); // إخفاء الأرقام الفردية
        var salary1 = $(this).text();
        total1 += parseInt(salary1) || 0;
    });
    $('.salaryrented').text(total1).hide(); // حطينا الناتج وأخفيناه في نفس السطر

    // د. تجميع أرباح الكتب المباعة فقط (للرسم البياني)
    var total2 = 0;
    $('.soldtotals').each(function(){
        $(this).hide(); 
        var salary2 = $(this).text();
        total2 += parseInt(salary2) || 0;
    });
    $('.salarysold').text(total2).hide();


    // ===============================================================
    // 2. قسم تفاعلات واجهة المستخدم (Sidebar & Modals)
    // ===============================================================

    // إخفاء وإظهار فورم إضافة قسم جديد
    $("#catinput").hide();
    
    $("#addcat").click(function(e){
        e.preventDefault(); // بتمنع الصفحة إنها تعمل ريفرش لما تدوس
        $("#catinput").show();
    });
    
    $("#backcat").click(function(e){
        e.preventDefault(); 
        $("#catinput").hide();
    });

    // إعدادات الـ Bootstrap Modal (لو بتستخدمه)
    $('#myModal').on('shown.bs.modal', function () {
        $('#myInput').trigger('focus');
    });


    // ===============================================================
    // 3. قسم الفلاتر (ربط الجافاسكريبت بلوب جانجو)
    // ===============================================================

// 1. فلاتر الأقسام: هنلف على "الأقسام" نفسها مش الكتب
// زرار "الكل" - بيظهر كل الكتب تاني
    $("#show-all-books").click(function(e){
        e.preventDefault(); // عشان الصفحة متعلمش ريفرش وتنط لفوق
        $(".bookhide").show(); // بيعرض كل العلب بتاعت الكتب تاني
    });

    // فلاتر الأقسام 
    {% for cat in category %}
        $(".cat{{cat.id}}").click(function(e){
            e.preventDefault(); // تمنع نطّة الصفحة لفوق
            $(".bookhide").hide(); 
            $(".book{{cat.id}}").show(); 
        });
    {% endfor %}


// 2. فلاتر الحالة: دي حالات ثابتة فهنكتبها من غير لوب خالص
$(".statusavailable").click(function(){
  $(".bookhide").hide();
  $(".bookavailable").show();
});

$(".statusrented").click(function(){
  $(".bookhide").hide();
  $(".bookrented").show();
});

$(".statussold").click(function(){
  $(".bookhide").hide();
  $(".booksold").show();
});


// ===============================================================
    // 4. البحث اللحظي (الذكي بدون ريفرش - بحث بالعنوان فقط)
    // ===============================================================
    $("#search_input").on('input', function() {
        var searchValue = $(this).val().toLowerCase(); 
        
        // لو المربع بقى فاضي
        if (searchValue === "") {
            if (window.location.search) {
                window.location.href = window.location.pathname; 
            } else {
                $(".bookhide").show();
            }
        } else {
            // لو اليوزر بيكتب حروف، فلتر الكتب
            $(".bookhide").each(function() {
                
                // التعديل السحري هنا: 
                // بدل ما نسحب كل النص، هنبحث جوه الـ h3 والـ h2 اللي شايلين العنوان بس!
                var bookTitle = $(this).find('.widget-user-username, .lead').text().toLowerCase();
                
                // هندور جوه العنوان بس
                if (bookTitle.indexOf(searchValue) > -1) {
                    $(this).show();
                } else {
                    $(this).hide();
                }
            });
        }
    });

}); // نهاية بلوك document.ready
</script>
